<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Makinesi - Final</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hesap-makinesi { background-color: #34495e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); width: 320px; }
        .yazı-ekranı { width: 100%; height: 70px; background-color: #ecf0f1; margin-bottom: 20px; border-radius: 10px; box-sizing: border-box; padding: 15px; text-align: left; font-size: 32px; font-weight: bold; color: #333; display: flex; align-items: center; justify-content: flex-end; overflow: hidden; }
        .butonlar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        button { padding: 20px; font-size: 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.1s; background-color: #fff; color: #2c3e50; }
        button:active { transform: scale(0.95); }
        .esittir { background-color: #27ae60; color: white; grid-column: span 1; }
        .islem { background-color: #e67e22; color: white; }
        .genis-kutu { background-color: #e74813; grid-column: span 2; }
    </style>
</head>
<body>  

    <div class="hesap-makinesi">
        <div class="yazı-ekranı">0</div>
        <div class="butonlar" id="butonlars">
            <button class="genis-kutu">CE</button>
            <button class="genis-kutu">AC</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="islem" id="/islem">/</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="islem" id="xislem">X</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="islem" id="-islem">-</button>
            <button class="sifir">0</button>
            <button>.</button>
            <button class="esittir" id="esislem">=</button>
            <button class="islem" id="+islem">+</button>
        </div>
    </div>

    <script>
        const tusTakimi = document.getElementById("butonlars");
        const ekran = document.querySelector(".yazı-ekranı");

        // --- MÜHENDİS NOTU: Değişken Yapısı ---
        // Ekranı kirletmemek için sayıları burada temiz tutuyoruz.
        let suankiSayi = "";      // Kullanıcının o an girdiği rakamlar
        let hafizadakiSayi = "";  // İşlemden önceki sayı
        let bekleyenIslem = "";   // +, -, *, /
        let ekranTemizlenmeli = false; // İşlem butonuna basıldıktan sonra ekranın temizlenip temizlenmeyeceğini kontrol eder

        // --- YARDIMCI FONKSİYONLAR ---

        function ekranGuncelle(deger) {
            // Eğer işlem butonuna yeni basıldıysa, ekranı temizle ve yeni sayıyı yaz
            if (ekranTemizlenmeli) {
                ekran.innerText = "";
                ekranTemizlenmeli = false;
            }

            if (ekran.innerText === "0") {
                ekran.innerText = deger;
            } else {
                ekran.innerText += deger;
            }
        }

        function islemyap(islem) {
            // Eğer zaten bir işlem bekliyorsa önce onu hesaplayalım (Zincirleme işlem: 5 + 3 - 2 gibi)
            if (bekleyenIslem !== "") {
                hesapla();
            }

            hafizadakiSayi = ekran.innerText; // Ekranda ne varsa hafızaya al
            bekleyenIslem = islem;            // Hangi işlemi yapacağız?
            ekranTemizlenmeli = true;         // "Bir sonraki rakam girildiğinde ekranı temizle" emri
        }

        function hesapla() {
            // Eğer işlem yoksa veya hafıza boşsa bir şey yapma
            if (bekleyenIslem === "" || ekranTemizlenmeli) return;

            let sonuc = 0;
            // parseFloat ile temiz sayıya çeviriyoruz
            const sayi1 = parseFloat(hafizadakiSayi);
            const sayi2 = parseFloat(ekran.innerText); 

            // İşlemi yap
            if (bekleyenIslem === "+") sonuc = sayi1 + sayi2;
            if (bekleyenIslem === "-") sonuc = sayi1 - sayi2;
            if (bekleyenIslem === "X") sonuc = sayi1 * sayi2; // Butonda X yazıyor ama işlem *
            if (bekleyenIslem === "/") {
                if(sayi2 === 0) {
                    alert("Sıfıra bölünemez!");
                    temizle();
                    return;
                }
                sonuc = sayi1 / sayi2;
            }

            ekran.innerText = sonuc; // Sonucu göster
            hafizadakiSayi = sonuc;  // Sonucu hafızaya al (belki devam eder)
            bekleyenIslem = "";      // İşlem tamamlandı
        }

        function temizle() {
            suankiSayi = "";
            hafizadakiSayi = "";
            bekleyenIslem = "";
            ekran.innerText = "0";
        }

        // --- ANA TIKLAMA OLAYI ---
        tusTakimi.addEventListener("click", function(olay) {
            const tiklanan = olay.target;
            if (tiklanan.tagName !== "BUTTON") return;
            
            const basilanTus = tiklanan.innerText;

            // 1. Temizleme Tuşları (AC ve CE)
            if (basilanTus === "AC" || basilanTus === "CE") {
                temizle();
                return;
            }

            // 2. Eşittir Tuşu
            if (tiklanan.classList.contains("esittir")) {
                hesapla();
                return;
            }

            // 3. İşlem Tuşları (+, -, /, X)
            if (tiklanan.classList.contains("islem")) {
                islemyap(basilanTus);
                return;
            }

            // 4. Rakamlar (ve nokta)
            // Yukarıdakilerin hiçbiri değilse rakamdır.
            ekranGuncelle(basilanTus);
        });
    </script>
</body>
</html>
