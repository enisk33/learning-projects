}


const sifreUret = function(uzunluk) {
    const karakterler = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let sifre = "";
    for (let i=0;i<uzunluk;i++){
        index=Math.floor(Math.random() * karakterler.length);
        sifre+=karakterler[index];

    }
    console.log(sifreUret);
    // Döngü kurup rastgele karakter seçip sifre'ye ekle
    // İpucu: Math.floor(Math.random() * karakterler.length) sana rastgele index verir.
    
    return sifre;
};
